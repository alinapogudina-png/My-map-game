<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Education Map Game Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { margin:0; font-family:sans-serif; background:#eef1fb; }
  #map {
    position:relative; 
    width:95vw; max-width:800px; height:68vw; max-height:500px; 
    background:url('https://i.imgur.com/6UTvQrb.jpg') center/cover no-repeat;
    margin: 1.5em auto 0 auto; border:3px solid #444; border-radius:12px; overflow:hidden;
    box-shadow:0 0 16px #0002;
    touch-action:none;
  }
  .artifact {
    width:10vw; max-width:38px; min-width:28px; aspect-ratio:1/1;
    background:url('https://cdn-icons-png.flaticon.com/512/235/235861.png') center/cover no-repeat;
    position:absolute; opacity:0; cursor:pointer; z-index:2;
    transition:opacity .2s;
    user-select:none;
  }
  .artifact.visible { opacity:1; }
  .artifact.temp-hide {opacity:0 !important; pointer-events:none;}
  .shake { animation: shake .34s; }
  @keyframes shake { 10%{transform:translateX(-8px);} 30%{transform:translateX(8px);} 60%{transform:translateX(-6px);} 80%{transform:translateX(6px);} }
  .path-step {
    width:9vw; min-width:22px; max-width:30px;
    aspect-ratio:1/1;
    background:url('https://cdn-icons-png.flaticon.com/512/763/763704.png') center/cover no-repeat;
    position:absolute; z-index:3;
    transition: left 1.3s cubic-bezier(.41,1.27,.5,1), top 1.3s cubic-bezier(.41,1.27,.5,1), opacity .7s;
    pointer-events:none;
  }
  #stored-step-row {
    display:flex; flex-direction:row; position:absolute; left:4vw; top:1vw; z-index:10; height:36px;
    background:rgba(202,202,255,0.02); border-radius:8px; padding:1vw 2vw;
  }
  #counter {
    position:absolute; top:1vw; right:4vw; z-index:11; min-width:100px; min-height:38px;
    background-size:cover;
    box-shadow: 0 2px 16px #0004;
    color: #1446bc; font-weight: bold; font-size:5vw; max-font-size:22px;
    display:flex; align-items:center; justify-content:center;
    border-radius:16px; padding:7px 16px; transition: background 0.2s;
    font-family:Arial;
  }
  #final {
    position:absolute;width:14vw;max-width:40px;height:14vw;max-height:40px;z-index:3;left:86vw;top:54vw;display:none;
    background:url('https://cdn-icons-png.flaticon.com/512/709/709790.png') center/cover no-repeat;
    cursor:pointer;
    transition: box-shadow .2s;
  }
  #question-modal {
    display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:#0008; z-index:200;
    align-items:center; justify-content:center;
  }
  #question-box {
    background:#fff; padding:3vw 4vw; border-radius:12px; min-width:200px; text-align:center; font-size:4vw; max-width:85vw; box-shadow:0 8px 24px #0002;
  }
  button, #lang-select, #customize-bar input, #customize-bar select {
    font-size:1.2em; border-radius:7px; border:1px solid #aaa; padding: .3em .9em;
  }
  #customize-bar {
    margin:1.1em auto 0 auto; width:min(97vw,780px); background:#eee; padding:10px 2vw;
    border-radius:7px; box-shadow:0 2px 8px #0002; display:flex;align-items:center;gap:16px; flex-wrap:wrap;
  }
  #start-modal, #end-modal {
    position:fixed; left:0;top:0;right:0;bottom:0;z-index:999;background:#0008;
    display:flex;align-items:center;justify-content:center;
  }
  #start-content, #end-content {
    background:#fff; border-radius:18px; padding:2.3vw 3vw 2vw 3vw;
    box-shadow:0 8px 56px #0005; font-size:4vw; max-width:87vw; text-align:center;
  }
  #end-content {font-size:3.2vw;}
  @media(max-width:540px){
    #map {height:72vw;max-height:72vw;} 
    #stored-step-row{height:10vw;}
    #final{left:78vw;top:62vw;}
    #customize-bar{font-size:0.94em;}
    #counter{font-size:4vw; min-width:68px;}
    #question-box{font-size:5vw;}
  }
  /* Кнопка звука */
  #sound-btn {
      position:fixed;
      z-index:9999;
      right:2vw;
      bottom:2vw;
      width:40px;
      height:40px;
      background:rgba(255,255,255,0.78);
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 3px 12px #0004;
      cursor:pointer;
      transition:.2s background;
  }
  #sound-btn:hover{background:rgba(220,220,255,0.99);}
  #sound-btn svg{width:28px;height:28px;}
</style>
</head>
<body>
<div id="customize-bar">
  <b>Настройки:</b>
  Фон счетчика:
  <select id="counter-bg">
    <option value="cloud">Облака</option>
    <option value="paper">Бумага</option>
    <option value="star">Звёзды</option>
  </select>
  Цвет текста: <input type="color" id="counter-color" value="#1446bc">
  Шрифт: 
  <select id="counter-font">
    <option value="Arial">Arial</option>
    <option value="Verdana">Verdana</option>
    <option value="Georgia">Georgia</option>
    <option value="Comic Sans MS">Comic Sans MS</option>
  </select>
  Язык:
  <select id="lang-select">
    <option value="RU">Русский</option>
    <option value="EN">English</option>
  </select>
</div>

<!-- Вводное сообщение -->
<div id="start-modal">
  <div id="start-content">
    <span id="intro-msg"></span><br><br>
    <button id="start-btn">Старт!</button>
  </div>
</div>

<!-- Карта -->
<div id="map">
  <div id="counter">Артефактов: 0/3</div>
  <div id="stored-step-row"></div>
  <div class="artifact" data-idx="0" style="top: 12vw; left: 23vw;"></div>
  <div class="artifact" data-idx="1" style="top: 60vw; left: 48vw;"></div>
  <div class="artifact" data-idx="2" style="top: 38vw; left: 74vw;"></div>
  <div id="final"></div>
</div>

<!-- Окно вопроса -->
<div id="question-modal">
  <div id="question-box">
    <div id="question-text"></div>
    <input type="text" id="answer" placeholder="">
    <br><br>
    <button onclick="checkAnswer()"></button>
    <div id="message" style="color:red; margin-top:5px;"></div>
  </div>
</div>

<!-- Финал -->
<div id="end-modal" style="display:none">
  <div id="end-content">
    <span id="end-msg"></span>
    <br><br><button onclick="restart()"></button>
  </div>
</div>

<!-- Кнопка звука -->
<div id="sound-btn" title="Отключить звук">
  <svg id="sound-on" style="display:block;" viewBox="0 0 24 24" fill="none"><path d="M3 10V14H7L12 19V5L7 10H3Z" fill="#0a355c"/></svg>
  <svg id="sound-off" style="display:none;" viewBox="0 0 24 24" fill="none"><path d="M16.5 12C16.5 13.3807 15.8807 14.6307 14.8504 15.5156M17.6105 17.1684L6.83159 6.38948M4 19.25L19.25 4M12 4.75V19.25" stroke="#792d2d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
</div>

<script>
  // --- АУДИО СИСТЕМА ---
  let soundEnabled = true;
  const sfx_ok = new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_115b9ea174.mp3");   // Correct
  const sfx_error = new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_115b958799.mp3"); // Error
  const sfx_final = new Audio("https://cdn.pixabay.com/audio/2022/10/16/audio_12ab154962.mp3"); // Final
  const sfx_restart = new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_115b9e2855.mp3");// Restart

  function play_ok(){ if(soundEnabled){ sfx_ok.pause(); sfx_ok.currentTime=0; sfx_ok.play(); } }
  function play_error(){ if(soundEnabled){ sfx_error.pause(); sfx_error.currentTime=0; sfx_error.play(); } }
  function play_final(){ if(soundEnabled){ sfx_final.pause(); sfx_final.currentTime=0; sfx_final.play(); } }
  function play_restart(){ if(soundEnabled){ sfx_restart.pause(); sfx_restart.currentTime=0; sfx_restart.play(); } }

  const soundBtn = document.getElementById('sound-btn');
  soundBtn.onclick = function(){
      soundEnabled = !soundEnabled;
      document.getElementById('sound-on').style.display = soundEnabled ? "block" : "none";
      document.getElementById('sound-off').style.display = !soundEnabled ? "block" : "none";
      soundBtn.title = soundEnabled ? "Отключить звук" : "Включить звук";
  };

  // -- Данные для языка, вопросов, сообщений --
  let dict = {
    RU:{
      intro: "Cобери все артефакты!",
      final: "Молодец! Ты нашёл секретное место!",
      q: [
        "Кто лесной народ в Средиземье? (эльф, гном, маг)",
        "Кто добывает руду под горами?",
        "Как называют могущественного обладателя посоха?"
      ],
      a:["эльф","гном","волшебник"],
      answer:"Ответить",
      found:"Артефактов: ",
      of:" из ",
      restart:"Попробовать еще раз",
      wrong:["Неверно, попробуйте еще!","Подсказка: ищите в сказочных лесах :)","3 ошибки — начало сначала!"],
      placeholder:"Введите ответ..."
    },
    EN:{
      intro: "Collect all the artifacts!",
      final: "Good job! You have found the secret place!",
      q: [
        "Who are the forest folk of Middle-earth? (elf, dwarf, wizard)",
        "Who mines ore under the mountains?",
        "What do you call a mighty staff-owner?"
      ],
      a:["elf","dwarf","wizard"],
      answer:"Answer",
      found:"Artifacts: ",
      of:" of ",
      restart:"Try again",
      wrong:["Wrong, try again!","Hint: hiding in fairytale woods :)","3 mistakes — restart!"],
      placeholder:"Enter your answer..."
    }
  };
  let LANG ="RU";

  // -- Кастомизация счетчика --
  const counter = document.getElementById('counter');
  const counterBgs = {
    cloud: 'url(https://cdn.pixabay.com/photo/2010/12/13/10/09/clouds-1999_1280.jpg)',
    paper: 'url(https://cdn.pixabay.com/photo/2017/01/06/19/15/paper-1955842_1280.jpg)',
    star: 'url(https://cdn.pixabay.com/photo/2013/10/07/14/29/stars-191999_1280.jpg)',
  };
  function updateCounterStyle(){
    counter.style.backgroundImage = counterBgs[document.getElementById('counter-bg').value];
    counter.style.color = document.getElementById('counter-color').value;
    counter.style.fontFamily = document.getElementById('counter-font').value;
  }
  document.getElementById('counter-bg').onchange = updateCounterStyle;
  document.getElementById('counter-color').oninput = updateCounterStyle;
  document.getElementById('counter-font').onchange = updateCounterStyle;
  updateCounterStyle();

  // -- Выбор языка --
  document.getElementById('lang-select').onchange = ev=>{
    LANG = ev.target.value;
    refreshLang();
  };
  function refreshLang(){
    document.getElementById('intro-msg').textContent = dict[LANG].intro;
    document.getElementById('start-btn').textContent = "Старт!";
    document.querySelector("#question-modal button").textContent=dict[LANG].answer;
    document.getElementById("end-msg").textContent=dict[LANG].final;
    document.querySelector("#end-modal button").textContent=dict[LANG].restart;
    document.getElementById("answer").placeholder=dict[LANG].placeholder;
    updateCounter();
  }

  // -- Вводное сообщение --
  document.getElementById('intro-msg').textContent = dict[LANG].intro;
  document.getElementById('start-btn').onclick = function(){
    document.getElementById('start-modal').style.display='none';
  }

  // -- Вопросы/ответы, движение, адаптация --
  const artifacts = document.querySelectorAll('.artifact');
  let n = dict[LANG].q.length;
  let found = 0, foundSteps = [];
  let pathSteps = [];
  let currentArtifact = null, mistakes = [0,0,0];
  let ROUND = 1, TEMP_HIDE = [false,false,false];

  // -- Обновление счетчика --
  function updateCounter() {
    counter.textContent = dict[LANG].found + found + dict[LANG].of + n;
  }

  // -- Лента для следов --
  const storedRow = document.getElementById('stored-step-row');

  // -- Демонстрация артефактов при наведении --
  document.getElementById('map').addEventListener('mousemove', e => {
    const rect = e.target.closest('#map').getBoundingClientRect();
    artifacts.forEach(a=>{
      let ax = a.offsetLeft + a.offsetWidth/2, ay = a.offsetTop + a.offsetHeight/2;
      let dist = Math.hypot(e.clientX-rect.left-ax, e.clientY-rect.top-ay);
      if (dist < 66 && !a.classList.contains('collected') && !a.classList.contains('temp-hide')) a.classList.add('visible');
      else if (!a.classList.contains('collected') && !a.classList.contains('temp-hide')) a.classList.remove('visible');
    });
  });

  // --- Мобильное: по тапу рядом показать/спрятать —
  document.getElementById('map').addEventListener('touchstart', e=>{
    let x = e.touches[0].clientX, y = e.touches[0].clientY;
    const rect = e.target.closest('#map').getBoundingClientRect();
    artifacts.forEach(a=>{
      let ax = a.offsetLeft + a.offsetWidth/2 + rect.left, ay = a.offsetTop + a.offsetHeight/2 + rect.top;
      let dist = Math.hypot(x-ax, y-ay);
      if (dist < 67 && !a.classList.contains('collected') && !a.classList.contains('temp-hide')) a.classList.add('visible');
      else if (!a.classList.contains('collected') && !a.classList.contains('temp-hide')) a.classList.remove('visible');
    });
  });

  artifacts.forEach((art, idx)=>{
    art.onclick = ()=>{ if (!art.classList.contains('temp-hide')){ currentArtifact={node:art, idx}; showQuestion(idx);} };
    art.ontouchend = ()=>{if (!art.classList.contains('temp-hide')){ currentArtifact={node:art, idx}; showQuestion(idx);} };
  });

  // -- Окно вопроса --
  function showQuestion(idx){
    document.getElementById('question-modal').style.display = 'flex';
    document.getElementById('question-text').textContent = dict[LANG].q[idx];
    document.getElementById('answer').value = "";
    document.getElementById('message').textContent = "";
    document.getElementById('answer').focus();
  }

  // -- Анимация ошибки
  function animateShake(node){
    node.classList.remove('shake');
    setTimeout(function(){node.classList.add('shake');}, 10);
    setTimeout(function(){node.classList.remove('shake');}, 400);
  }

  function checkAnswer(){
    let idx = currentArtifact.idx, art = currentArtifact.node;
    let a = document.getElementById('answer').value.trim().toLowerCase();
    if(a === dict[LANG].a[idx]){
      play_ok();
      document.getElementById('question-modal').style.display = 'none';
      collectArtifact(art, idx);
    } else {
      play_error();
      mistakes[idx]++;
      animateShake(document.getElementById('question-box'));
      animateShake(art);
      if(mistakes[idx]===1){
        document.getElementById('message').textContent = dict[LANG].wrong[0];
        art.classList.add('temp-hide');
        setTimeout(()=>{art.classList.remove('temp-hide');},10000);
      }
      else if(mistakes[idx]===2){
        document.getElementById('message').textContent = dict[LANG].wrong[1];
        art.classList.add('temp-hide');
        setTimeout(()=>{art.classList.remove('temp-hide');},10000);
      }
      else if(mistakes[idx]>=3){
        play_restart();
        document.getElementById('message').textContent = dict[LANG].wrong[2];
        setTimeout(()=>restart(),1400)
      }
    }
  }

  function collectArtifact(node, idx){
    node.classList.add('collected'); node.style.display='none';
    found++; updateCounter();
    // След — в ленту
    let step = document.createElement('div'); step.className='path-step';
    step.style.position = 'static'; step.style.opacity=1;
    storedRow.appendChild(step);
    pathSteps.push({dom:step, mapX:node.style.left, mapY:node.style.top});
    foundSteps.push([parseFloat(node.style.left),parseFloat(node.style.top)]);
    if(found === n){ setTimeout(showFinal,750);}
  }

  // -- Перемещение следов на карту (плавно) + линия --
  function showFinal(){
    counter.textContent = dict[LANG].found + n + dict[LANG].of + n;
    document.getElementById('final').style.display = '';
    play_final();
    let map = document.getElementById('map');
    let delay = 0;
    pathSteps.forEach((stepObj,i)=>{
      let step = stepObj.dom;
      let x = stepObj.mapX, y = stepObj.mapY;
      step.style.position = "absolute";
      step.style.transition = "left 1.3s cubic-bezier(.41,1.27,.5,1), top 1.3s cubic-bezier(.41,1.27,.5,1), opacity 1s";
      step.style.left = (4 + i*8) + "vw";
      step.style.top = "1vw";
      setTimeout(()=>{
        step.style.left = x;
        step.style.top = y;
      },1350+i*650);
    });
    setTimeout(drawRoute, 2200+800*n);
    setTimeout(function(){
      document.getElementById('end-modal').style.display='flex';
    },2800+900*n);
  }

  // -- Линия маршрута --
  function drawRoute(){
    let svgId = "route-svg";
    let svg = document.getElementById(svgId);
    if (!svg){ svg = document.createElementNS('http://www.w3.org/2000/svg',"svg"); svg.setAttribute("id",svgId); document.getElementById('map').appendChild(svg);}
    svg.innerHTML = ""; svg.style.display="block";
    svg.setAttribute("style","position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;");
    let coords = [...foundSteps, [86,54]];
    let d = coords.map((p,i)=> (i===0?'M':'L')+(p[0]+4)+"vw,"+(p[1]+4)+"vw").join(' ');
    svg.innerHTML = `<path d="${d}" stroke="gold" stroke-width="5" fill="none" stroke-dasharray="14"/>`;
  }

  // Финальная точка - переход
  document.getElementById('final').onclick = ()=> {
    window.location.href="https://genially.com";
  }

  // RESTART!
  function restart(){
    document.getElementById('end-modal').style.display='none';
    found=0; foundSteps=[]; pathSteps=[]; ROUND++;
    mistakes=[0,0,0]; TEMP_HIDE=[false,false,false];
    artifacts.forEach(a=>{ a.className='artifact'; a.style.display=''; a.classList.remove('temp-hide');});
    document.querySelectorAll('.path-step').forEach(e=>e.remove());
    let s=document.getElementById('route-svg'); if(s)s.remove();
    document.getElementById('final').style.display='none';
    storedRow.innerHTML='';
    updateCounter();
    document.getElementById('start-modal').style.display='flex';
  }

  window.onload = function(){
    refreshLang();
    updateCounter();
  }

  document.getElementById('counter-bg').onchange=updateCounterStyle;
  document.getElementById('counter-color').oninput=updateCounterStyle;
  document.getElementById('counter-font').onchange=updateCounterStyle;
  document.getElementById('lang-select').onchange=function(){ LANG=this.value; refreshLang(); }

</script>
</body>
</html>
