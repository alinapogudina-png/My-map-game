<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта-квест</title>
    <style>
        body {
            background: #eaf0fa;
            font-family: Arial, sans-serif;
            margin: 0; padding: 0;
        }
        #start-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh;
            background: rgba(32,56,95,0.33);
        }
        #start-game-btn {
            font-size: 2em; padding: 0.8em 1.7em;
            background: #8FC1E3; color: #334e6f; border: none; border-radius: 12px;
            cursor: pointer; box-shadow: 0 4px 18px #4442;
            transition: background 0.2s;
        }
        #start-game-btn:hover { background: #A0D8F1; }

        .hidden { display: none !important; }

        #game-content {
            padding: 0;
            min-height: 100vh;
        }
        #game-container {
            position: relative;
            width: 80vw; max-width: 950px; min-width: 300px;
            margin: 30px auto 0 auto;
            background: url('https://cdn.pixabay.com/photo/2013/07/13/14/14/map-162425_1280.png') center/cover no-repeat #fff;
            border-radius: 20px;
            box-shadow: 0 4px 23px #0003;
            min-height: 600px;
            overflow: hidden;
        }
        #artifacts-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }
        .artifact {
            width: 38px; height: 38px; position: absolute;
            background: url('https://cdn-icons-png.flaticon.com/512/235/235861.png') center/contain no-repeat;
            opacity: 0.85; cursor: pointer; transition: opacity 0.2s;
        }
        .artifact.found { opacity: 0.18; pointer-events: none; }
        #footprints-container {
            position: absolute; left: 0; top: 0; width: 100%; height: 100%; pointer-events: none;
        }
        .footprint {
            width: 28px; height: 28px; position: absolute;
            background: url('https://cdn-icons-png.flaticon.com/512/763/763704.png') center/contain no-repeat;
        }
        #collected-artifacts-panel {
            position: absolute; top: 10px; left: 10px; right: 170px;
            min-height: 30px; z-index: 2;
        }
        #score-counter {
            position: absolute; top: 17px; right: 23px; font-size: 1.65em;
            background: rgba(231,239,251,0.9);
            color: #1651a5; font-weight:bold; padding: 7px 25px;
            border-radius: 16px; z-index: 2;
            box-shadow: 0 2px 8px #0001;
            letter-spacing: 2px;
            user-select:none;
        }
        #final-target {
            position: absolute; left: 50%; bottom: 20px; transform: translateX(-50%);
            background: #78e099; color: #234726; 
            text-align: center; padding: 20px 32px; border-radius: 20px;
            font-size: 1.7em; font-weight: bold; text-decoration: none;
            box-shadow: 0 4px 18px #4442;
            border: 2px solid #4bb55e;
            transition: background 0.2s;
        }
        #final-target:hover { background: #bdf3c9; }

        #modal-overlay {
            position: fixed; left: 0; top: 0; right: 0; bottom: 0;
            background: rgba(25,25,45,0.60); z-index: 10;
            display: flex; align-items: center; justify-content: center;
        }
        #modal {
            background: #fff; padding: 33px 38px 28px 38px; border-radius: 18px;
            min-width: 260px; max-width: 92vw; box-shadow: 0 8px 38px #0005;
            text-align: center; font-size: 1.38em;
        }
        .answer-btn {
            display: block; font-size: 1em; margin: 13px auto; padding: 8px 24px;
            border-radius: 9px; border: none; background: #deddfa;
            color: #123366; font-weight: bold; box-shadow: 0 2px 8px #8aa2cc84;
            cursor: pointer; min-width: 120px; transition: background 0.2s;
        }
        .answer-btn:hover { background: #c3e2f5; }

        /* Кнопка звука */
        #sound-btn {
            position:fixed;
            z-index:9999;
            right:22px;
            bottom:22px;
            width:46px;
            height:46px;
            background:rgba(255,255,255,0.92);
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            box-shadow:0 3px 12px #0004;
            cursor:pointer;
            transition:.2s background;
        }
        #sound-btn:hover{background:rgba(220,238,255,0.99);}
        #sound-btn svg{width:30px;height:30px;}
        @media (max-width:760px){
            #game-container { min-height: 420px; }
            .artifact, .footprint{ width: 28px; height: 28px;}
            #final-target{font-size:1.25em;padding:13px 10px;}
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="start-game-btn">Start the adventure!</button>
    </div>

    <div id="game-content" class="hidden">
        <div id="game-container">
            <div id="artifacts-container"></div>
            <div id="footprints-container"></div>
            <div id="collected-artifacts-panel"></div>
            <div id="score-counter">0 / 5</div>
            <a href="https://www.genial.ly" target="_blank" id="final-target" class="hidden">
                Fantastic!<br>Here is our secret place!
            </a>
        </div>

        <div id="modal-overlay" class="hidden">
            <div id="modal">
                <p id="question-text"></p>
                <div id="answers-container"></div>
            </div>
        </div>
    </div>

    <!-- Аудио для звуковых эффектов -->
    <audio id="correct-sound" src="https://files.catbox.moe/6n1mv9.mp3" preload="auto"></audio>
    <audio id="chest-open-sound" src="https://files.catbox.moe/6wo57y.mp3" preload="auto"></audio>
    <audio id="final-target-sound" src="https://files.catbox.moe/4blw0b.mp3" preload="auto"></audio>
    <audio id="wrong-answer-sound" src="https://files.catbox.moe/6e8vp7.mp3" preload="auto"></audio>

    <!-- КНОПКА ЗВУКА -->
    <div id="sound-btn" title="Mute/unmute sound">
        <svg id="sound-on" style="display:block;" viewBox="0 0 24 24" fill="none"><path d="M3 10V14H7L12 19V5L7 10H3Z" fill="#0a355c"/></svg>
        <svg id="sound-off" style="display:none;" viewBox="0 0 24 24" fill="none"><path d="M16.5 12C16.5 13.3807 15.8807 14.6307 14.8504 15.5156M17.6105 17.1684L6.83159 6.38948M4 19.25L19.25 4M12 4.75V19.25" stroke="#792d2d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>

    <script>
    // --- SOUND ---
    let soundOn = true;
    const btnSound = document.getElementById('sound-btn');
    btnSound.onclick = function() {
        soundOn = !soundOn;
        document.getElementById('sound-on').style.display = soundOn ? "block" : "none";
        document.getElementById('sound-off').style.display = !soundOn ? "block" : "none";
    };

    function playIfOn(audio){
        if(soundOn) {
            audio.pause();
            audio.currentTime = 0;
            audio.play();
        }
    }

    // --- GAME DATA (edit here!) ---
    const ARTIFACTS = [
        {x: 14, y: 31, question: "What is the capital of France?", answers:["Paris", "London", "Rome"], correct:0},
        {x: 70, y: 62, question: "The largest planet?", answers:["Mars", "Venus", "Jupiter"], correct:2},
        {x: 50, y: 28, question: "Color of the sky?", answers:["Blue", "Red", "Green"], correct:0},
        {x: 23, y: 70, question: "Which animal barks?", answers:["Cat", "Dog", "Cow"], correct:1},
        {x: 75, y: 18, question: "How many days in a week?", answers:["5", "7", "10"], correct:1},
    ];
    // Укажите выше еще такие объекты для большего количества артефактов.
    // x и y — в процентах от размера карты, чтобы все было адаптивно

    // --- GAME LOGIC ---
    let collected = Array(ARTIFACTS.length).fill(false);
    let collectedCount = 0;

    const startScreen = document.getElementById('start-screen');
    const gameContent = document.getElementById('game-content');
    const artifactsContainer = document.getElementById('artifacts-container');
    const footprintsContainer = document.getElementById('footprints-container');
    const modalOverlay = document.getElementById('modal-overlay');
    const modal = document.getElementById('modal');
    const scoreCounter = document.getElementById('score-counter');
    const finalTarget = document.getElementById('final-target');
    const correctSound = document.getElementById('correct-sound');
    const chestSound = document.getElementById('chest-open-sound');
    const finalSound = document.getElementById('final-target-sound');
    const wrongSound = document.getElementById('wrong-answer-sound');
    const answersContainer = document.getElementById('answers-container');
    const questionText = document.getElementById('question-text');

    function resetGame() {
        collected = Array(ARTIFACTS.length).fill(false);
        collectedCount = 0;
        scoreCounter.textContent = `0 / ${ARTIFACTS.length}`;
        artifactsContainer.innerHTML = '';
        footprintsContainer.innerHTML = '';
        finalTarget.classList.add('hidden');
        renderArtifacts();
    }

    function renderArtifacts() {
        ARTIFACTS.forEach((item, idx) => {
            if(collected[idx]) return;
            const div = document.createElement('div');
            div.className = 'artifact';
            div.style.left = item.x + "%";
            div.style.top = item.y + "%";
            div.title = "Какой-то артефакт";
            div.addEventListener('mouseenter', () => div.style.opacity = 1.0);
            div.addEventListener('mouseleave', () => div.style.opacity = 0.85);
            div.addEventListener('click', () => showQuestion(idx));
            artifactsContainer.appendChild(div);
        });
    }

    function showQuestion(idx) {
        if (collected[idx]) return;
        questionText.textContent = ARTIFACTS[idx].question;
        answersContainer.innerHTML = '';
        ARTIFACTS[idx].answers.forEach((ans, i) => {
            const btn = document.createElement('button');
            btn.className = 'answer-btn';
            btn.textContent = ans;
            btn.onclick = () => checkAnswer(idx, i);
            answersContainer.appendChild(btn);
        });
        modalOverlay.classList.remove('hidden');
    }

    function checkAnswer(idx, answerIdx) {
        if (answerIdx === ARTIFACTS[idx].correct) {
            playIfOn(correctSound);
            collectArtifact(idx);
        } else {
            playIfOn(wrongSound);
            modal.classList.add('shake');
            setTimeout(()=>modal.classList.remove('shake'), 500);
        }
    }

    function collectArtifact(idx) {
        collected[idx] = true;
        collectedCount += 1;

        // Футпринт на карту:
        const f = document.createElement('div');
        f.className = 'footprint';
        f.style.left = ARTIFACTS[idx].x + '%';
        f.style.top = ARTIFACTS[idx].y + '%';
        footprintsContainer.appendChild(f);

        modalOverlay.classList.add('hidden');

        // Убрать артефакт
        Array.from(artifactsContainer.children)[idx].classList.add('found');

        scoreCounter.textContent = `${collectedCount} / ${ARTIFACTS.length}`;

        // Если все собрано:
        if(collectedCount === ARTIFACTS.length) {
            setTimeout(()=>{
                playIfOn(chestSound);
                finalTarget.classList.remove('hidden');
                setTimeout(() => playIfOn(finalSound), 200);
            }, 350);
        }
    }

    document.getElementById('start-game-btn').onclick = () => {
        startScreen.classList.add('hidden');
        gameContent.classList.remove('hidden');
        resetGame();
    };

    modalOverlay.onclick = (e) => {
        // клик мимо модального окна — не закрывать окно
        if (e.target === modalOverlay) return;
    };

    // Стартовая инициализация
    resetGame();

    // Для мобильных (фиксим кнопку звука)
    window.addEventListener('touchstart', function(){}, true);

    </script>
</body>
</html>
